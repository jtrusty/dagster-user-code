name: Release Please

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - name: Release Please
        uses: googleapis/release-please-action@v4.4.0
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
