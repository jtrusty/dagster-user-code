[build-system]
requires = ["hatchling>=1.27.0"]
build-backend = "hatchling.build"

[project]
name = "dagster-user-code"
version = "0.1.0"
description = "Dagster user-code image and Python package for Kubernetes execution"
readme = "README.md"
requires-python = ">=3.11,<3.13"
license = { text = "MIT" }
authors = [
  { name = "Justin" },
]
dependencies = [
  "dagster==1.12.14",
  "dagster-k8s==1.12.14",
  "dagster-postgres==1.12.14",
  "dagster-dbt==1.12.14",
  "dagster-aws==1.12.14",
  "dagster-pyspark==1.12.14",
  "dbt-core>=1.8,<2.0",
  "dbt-spark>=1.8,<2.0",
  "great-expectations[s3,spark]>=1.15.1,<2.0",
  "pyspark",
  "delta-spark",
  "pyarrow>=16,<20",
  "pandas>=2.2,<3.0",
  "boto3>=1.34,<2.0",
  "s3fs>=2024.6.0",
]

[project.optional-dependencies]
dev = [
  "pytest>=8,<9",
]
lineage = [
  "dagster-openlineage>=1.12,<1.13",
]
notebooks = [
  "ipykernel>=6,<7",
  "jupyterlab>=4,<5",
]
local = [
  "duckdb>=1.1,<2.0",
  "polars>=1.17,<2.0",
]

[tool.hatch.build.targets.wheel]
packages = ["src/dagster_user_code"]

[tool.pytest.ini_options]
testpaths = ["tests"]

